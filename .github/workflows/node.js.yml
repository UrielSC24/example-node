# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ---------------------------------------------------
  # FASE 1: Pruebas Unitarias
  # ---------------------------------------------------
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.20.0, 18.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Jest tests
        run: npm test

  # ---------------------------------------------------
  # FASE 2: Pruebas de Carga (K6)
  # ---------------------------------------------------
  performance_test:
    name: Ejecución de Pruebas de Carga
    needs: test 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run k6 cloud test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6_pruebas.js
          flags: --out cloud
          token: ${{ secrets.K6_CLOUD_TOKEN }} 
        env:
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}

  # ---------------------------------------------------
  # FASE 3: Análisis Estático (SAST)
  # ---------------------------------------------------
  sonarQube-analysis:
    name: Análisis SAST
    # Se ejecuta solo si las pruebas de carga (Fase 2) terminan correctamente
    needs: performance_test 
    runs-on: ubuntu-latest
    steps:
      - name: Clonación del repositorio (Checkout)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          
      - name: Ejecución de Escáner SonarQube
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=node-proyect
            -Dsonar.qualitygate.wait=true
