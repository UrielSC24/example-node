# ==============================================================================
# DESCRIPCIÓN GENERAL DEL PIPELINE CI/CD:
#
# Este pipeline implementa un flujo completo de Integración Continua y 
# Despliegue Continuo (CI/CD) en GitHub Actions, el cual se activa automáticamente
# ante cambios en la rama principal (main) mediante eventos de push o pull request.
#
# El flujo está estructurado en múltiples fases encadenadas que garantizan la
# calidad, seguridad, rendimiento y despliegue automatizado de una aplicación
# Node.js.
#
# ------------------------------------------------------------------------------

name: Node.js CI (Análisis de Gestión de Software)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

# ------------------------------------------------------------------------------
#
# FASE 1: PRUEBAS UNITARIAS
# En esta fase se valida el correcto funcionamiento del código ejecutando pruebas
# automatizadas con Jest en múltiples versiones de Node.js. Se instalan las
# dependencias del proyecto y se ejecutan los tests para asegurar compatibilidad
# y detectar errores tempranos. Si esta fase falla, el pipeline se detiene.
#
# ------------------------------------------------------------------------------  
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.20.0, 18.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Jest tests
        run: npm test

# ------------------------------------------------------------------------------
#
# FASE 2: PRUEBAS DE CARGA
# Una vez superadas las pruebas unitarias, se ejecutan pruebas de rendimiento
# utilizando k6. Estas pruebas simulan carga sobre la aplicación y permiten
# analizar su comportamiento bajo condiciones de estrés. Los resultados se envían
# a la nube para su monitoreo.
#
# ------------------------------------------------------------------------------
  performance_test:
    name: Ejecución de Pruebas de Carga
    needs: test 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run k6 cloud test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6_pruebas.js
          flags: --out cloud
          token: ${{ secrets.K6_CLOUD_TOKEN }} 
        env:
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}

# ------------------------------------------------------------------------------
#
# FASE 3: ANÁLISIS ESTÁTICO Y SEGURIDAD (SAST + SCA)
# En esta fase se realiza un análisis profundo del código fuente utilizando
# SonarQube. Se evalúan métricas de calidad, cobertura de pruebas, detección de
# vulnerabilidades y malas prácticas. También se ejecuta una auditoría de
# dependencias (npm audit) para identificar riesgos de seguridad en librerías.
# El pipeline puede detenerse si no se cumplen los estándares definidos.
#
# ------------------------------------------------------------------------------
  
  sonarQube-analysis:
    name: Análisis de Calidad de Código (SAST)
    needs: performance_test 
    runs-on: ubuntu-latest
    steps:
      - name: Clonación del repositorio (Checkout)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          
      - name: Instalación de dependencias (para análisis y seguridad)
        run: npm install

      - name: Auditoría de seguridad de dependencias (SCA)
        run: npm audit --audit-level=high || true

      - name: Generación de reporte de cobertura
        run: npm run test -- --coverage

      - name: Ejecución de Escáner SonarQube
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=node-proyect
            -Dsonar.qualitygate.wait=true
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.test.inclusions=tests/**/*.test.js
            -Dsonar.exclusions=node_modules/**,coverage/**,k6_pruebas.js,jest.config.js,eslint.config.mjs

# ------------------------------------------------------------------------------
#
# FASE 4: EMPAQUETADO EN CONTENEDOR
# Después de validar la calidad del software, se construye una imagen Docker de
# la aplicación. Esta imagen se etiqueta y se publica en GitHub Container
# Registry (GHCR), dejándola disponible para su despliegue en entornos remotos.
#
# ------------------------------------------------------------------------------
  
  docker-build:
    name: Empaquetado Docker (GHCR)
    # Se adapta para depender de los jobs previos de tu flujo
    needs: [performance_test, sonarQube-analysis]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convertir nombre de repo a minúsculas para Docker
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Construir y subir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}:latest

# ------------------------------------------------------------------------------
#
# FASE 5: DESPLIEGUE BLUE-GREEN (ZERO-DOWNTIME)
# Finalmente, se realiza un despliegue automatizado utilizando la estrategia
# Blue-Green. Se levanta una nueva versión de la aplicación en paralelo dentro
# de un servidor privado sin afectar la versión actual en producción.
#
# Posteriormente, un servidor público con Nginx actualiza dinámicamente la ruta
# del tráfico hacia la nueva versión validada. Este cambio se realiza sin
# interrupciones del servicio, garantizando disponibilidad continua (Zero-Downtime).
#
# ------------------------------------------------------------------------------
  deploy:
    name: Despliegue en Producción (Zero-Downtime)
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      # ---DESPLEGAR EN EL ENTORNO INACTIVO (SERVIDOR PRIVADO) ---
      - name: 1. Levantar contenedor paralelo en Servidor Privado
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_username: ${{ secrets.PROXY_USERNAME }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GH_TOKEN, REPO_NAME
          script: |
            echo "--- PREPARANDO CONTENEDOR DOCKER ---"
            
            # 1. Leer qué contenedor está activo actualmente
            if [ -f ~/current_deploy.env ]; then
              source ~/current_deploy.env
            else
              CURRENT_COLOR="Green"
            fi
            
            # 2. Invertir la lógica: Asignamos puertos fijos para evitar colisiones
            if [ "$CURRENT_COLOR" == "Blue" ]; then
              TARGET_COLOR="Green"
              TARGET_PORT="3001"
            else
              TARGET_COLOR="Blue"
              TARGET_PORT="3000"
            fi
            
            echo "El tráfico actual está en $CURRENT_COLOR. Actualizando el entorno inactivo: $TARGET_COLOR (Puerto $TARGET_PORT)..."
            
            REPO_LC=$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]')
            echo $GH_TOKEN | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 3. Limpiar SOLO el contenedor inactivo (El activo sigue sirviendo a los usuarios)
            sudo docker stop app-node-$TARGET_COLOR || true
            sudo docker rm app-node-$TARGET_COLOR || true
            
            # 4. Descargar y encender el nuevo contenedor
            sudo docker pull ghcr.io/$REPO_LC:latest
            sudo docker run -d -p $TARGET_PORT:3000 --name app-node-$TARGET_COLOR ghcr.io/$REPO_LC:latest
            
            # 5. Guardar el estado para la próxima vez
            echo "CURRENT_COLOR=$TARGET_COLOR" > ~/current_deploy.env

      # --- PASO 2: CONMUTAR EL TRÁFICO (SERVIDOR PÚBLICO) ---
      - name: 2. Conmutación Blue-Green en Nginx Público
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROXY_HOST }}
          username: ${{ secrets.PROXY_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "--- CAMBIANDO SEMÁFORO EN NGINX ---"            
            # USAMOS LA RUTA ABSOLUTA DE TU USUARIO
            if [ -f /home/g2022371107/current_deploy.env ]; then
              source /home/g2022371107/current_deploy.env
            else
              CURRENT_COLOR="Green"
            fi
            
            if [ "$CURRENT_COLOR" == "Blue" ]; then
              TARGET_COLOR="Green"
              TARGET_PORT="3001"
            else
              TARGET_COLOR="Blue"
              TARGET_PORT="3000"
            fi
            
            export APP_TARGET_IP="10.0.2.2"
            export APP_TARGET_PORT=$TARGET_PORT
            export DEPLOYMENT_COLOR=$TARGET_COLOR
            
            echo "Enrutando usuarios hacia la nueva versión en: $TARGET_COLOR ($APP_TARGET_IP:$TARGET_PORT)"
            
            # USAMOS LA RUTA ABSOLUTA PARA LA PLANTILLA
            cat /home/g2022371107/nginx.conf.template | envsubst '${APP_TARGET_IP} ${APP_TARGET_PORT} ${DEPLOYMENT_COLOR}' | sudo tee /etc/nginx/conf.d/default.conf > /dev/null
            
            sudo nginx -t
            if [ $? -eq 0 ]; then
              sudo systemctl reload nginx
              # USAMOS LA RUTA ABSOLUTA PARA GUARDAR EL ESTADO
              echo "CURRENT_COLOR=$TARGET_COLOR" | sudo tee /home/g2022371107/current_deploy.env > /dev/null
              echo "¡Conmutación a $TARGET_COLOR exitosa! Zero-Downtime logrado."
            else
              echo "Error crítico en la sintaxis de Nginx."
              exit 1
            fi

# ------------------------------------------------------------------------------
#
# CONCLUSIÓN
# Este pipeline automatiza completamente el ciclo de vida del software, integrando
# pruebas, análisis de seguridad, construcción de artefactos y despliegue
# continuo, asegurando entregas rápidas, seguras y confiables.
#
# ==============================================================================
